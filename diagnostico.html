<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>7Group &mdash; Business Diagnostic</title>
<meta name="robots" content="noindex,nofollow">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f5;--bg-dark:#0a0a0a;--text:#0a0a0a;--text-light:#6b6b6b;
  --text-inv:#fff;--cyan:#5ee7f7;--border:#e8e8e8;
  --border-dark:rgba(255,255,255,.08);--white:#fff;
  --green:#2ecc71;--yellow:#f1c40f;--red:#e74c3c;
  font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
body{background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}

.topbar{
  background:rgba(10,10,10,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-dark);
  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;
}
.topbar .logo-text{color:var(--text-inv);font-size:18px;font-weight:700;letter-spacing:-.5px;opacity:.9}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar .badge{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--cyan)}
.lang-toggle{display:flex;gap:8px;font-size:13px;letter-spacing:.3px}
.lang-toggle span{color:rgba(255,255,255,.35);cursor:pointer;transition:color .2s;padding:2px 0}
.lang-toggle span:hover{color:rgba(255,255,255,.7)}
.lang-toggle span.active{color:var(--text-inv)}

.shell{max-width:680px;margin:0 auto;padding:32px 20px 80px}

.hero{margin-bottom:40px}
.hero .tag{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cyan);margin-bottom:12px}
.hero h1{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1.15;margin-bottom:8px}
.hero h1 span{color:var(--text-light)}
.hero .subtitle{color:var(--text-light);font-size:15px}
.hero .ref{font-size:12px;color:var(--text-light);margin-top:8px;font-family:'Courier New',monospace;letter-spacing:1px}
.hero .profile-tag{display:inline-block;margin-top:10px;padding:6px 14px;border:1px solid var(--cyan);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan)}

.card{border-left:1px solid var(--border);padding:24px 0 24px 24px;margin-bottom:32px}
.card-label{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:16px}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.summary-item{padding:14px 16px;border:1px solid var(--border)}
.summary-item .si-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px}
.summary-item .si-value{font-size:15px;font-weight:600}

.score-section{display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.score-ring{position:relative;width:120px;height:120px;flex-shrink:0}
.score-ring svg{width:120px;height:120px;transform:rotate(-90deg)}
.score-ring .bg{fill:none;stroke:var(--border);stroke-width:6}
.score-ring .fg{fill:none;stroke-width:6;stroke-linecap:square;transition:stroke-dashoffset .8s ease}
.score-ring .score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:700;letter-spacing:-1px}
.score-ring .score-label{position:absolute;top:50%;left:50%;transform:translate(-50%,14px);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light)}
.score-breakdown{flex:1;min-width:200px}
.sb-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.sb-row:last-child{border:none}
.sb-row .sb-name{font-size:13px;color:var(--text-light)}
.sb-row .sb-status{font-size:12px;font-weight:600;letter-spacing:.5px}
.sb-row .sb-status.yes{color:var(--green)}
.sb-row .sb-status.partial{color:var(--yellow)}
.sb-row .sb-status.no{color:var(--red)}

.needs-list{display:flex;flex-wrap:wrap;gap:8px}
.need-tag{padding:8px 16px;border:1px solid var(--border);font-size:13px;transition:all .2s}
.need-tag.matched{border-color:var(--cyan);background:rgba(94,231,247,.06)}

.solutions-grid{display:flex;flex-direction:column;gap:16px}
.sol-card{border:1px solid var(--border);padding:20px 24px;transition:border-color .2s}
.sol-card:hover{border-color:var(--text-light)}
.sol-card .sol-num{font-size:11px;letter-spacing:2.5px;color:var(--cyan);margin-bottom:8px}
.sol-card .sol-title{font-size:18px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.sol-card .sol-desc{font-size:14px;color:var(--text-light);line-height:1.5}
.sol-card .sol-scope{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
.sol-card .sol-scope span{font-size:11px;padding:4px 10px;border:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase;color:var(--text-light)}

.insight-block{padding:16px 20px;border:1px solid var(--border);margin-bottom:12px}
.insight-block .ib-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.insight-block .ib-text{font-size:15px;font-style:italic;color:var(--text)}

.cta-section{text-align:center;padding:48px 20px;margin-top:32px;border-top:1px solid var(--border)}
.cta-section h2{font-size:24px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.cta-section p{color:var(--text-light);font-size:14px;margin-bottom:24px;max-width:400px;margin-inline:auto}
.cta-btn{
  display:inline-block;padding:16px 40px;
  background:var(--text);color:var(--white);
  text-decoration:none;font-size:13px;font-weight:500;
  letter-spacing:1.5px;text-transform:uppercase;
  border:2px solid var(--text);transition:all .2s;
}
.cta-btn:hover{background:var(--cyan);border-color:var(--cyan);color:var(--bg-dark)}

.foot{text-align:center;padding:24px;font-size:11px;color:var(--text-light);letter-spacing:1px;text-transform:uppercase}

.empty{text-align:center;padding:80px 20px}
.empty h2{font-size:24px;font-weight:700;letter-spacing:-1px;margin-bottom:8px}
.empty p{color:var(--text-light);font-size:14px}

@media(max-width:480px){
  .hero h1{font-size:28px}
  .summary-grid{grid-template-columns:1fr}
  .score-section{flex-direction:column;align-items:flex-start}
}
</style>

  /* ── Detect language by timezone/browser ── */
  var lang = 'en';
  function detectLang(){
    try {
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      var tzLower = tz.toLowerCase();
      var esZones = ['bogota','mexico','lima','santiago','buenos_aires','caracas','guayaquil',
        'havana','montevideo','asuncion','la_paz','managua','tegucigalpa','san_salvador',
        'guatemala','panama','santo_domingo','costa_rica','havana','america/bogota',
        'america/mexico','america/lima','america/santiago','america/argentina',
        'america/caracas','america/guayaquil','europe/madrid','atlantic/canary'];
      for(var i=0;i<esZones.length;i++){
        if(tzLower.indexOf(esZones[i])>-1) return 'es';
      }
      var navLang = (navigator.language||navigator.userLanguage||'en').toLowerCase();
      if(navLang.indexOf('es')===0) return 'es';
    } catch(e){}
    return 'en';
  }

  /* ── Parse URL params ── */
  function getParams(){
    var src = window.location.search || window.location.hash.replace('#','?');
    var p = new URLSearchParams(src);
    var d = {};
    p.forEach(function(v,k){ d[k] = v; });
    return d;
  }

  /* ── Compute digital score ── */
  function computeScore(data){
    var checks = [
      { key:'tiene_web', test:function(v){return v==='si'?2:v==='basica'?1:0;}, max:2 },
      { key:'redes', test:function(v){var n=v?v.split(',').length:0;return n>=3?2:n>=1?1:0;}, max:2 },
      { key:'redes', test:function(v){return v&&v.indexOf('Google Maps')>-1?2:0;}, max:2 },
      { key:'captacion_actual', test:function(v){var l=v?v.toLowerCase():'';return(l.indexOf('social')>-1||l.indexOf('google')>-1||l.indexOf('ads')>-1||l.indexOf('digital')>-1||l.indexOf('redes')>-1)?2:(l.indexOf('referr')>-1||l.indexOf('referid')>-1)?1:0;}, max:2 },
      { key:'necesidades', test:function(v){return 0;}, max:2 }
    ];
    var names = [
      {en:'Website',es:'Pagina web'},
      {en:'Social Media',es:'Redes sociales'},
      {en:'Google Maps',es:'Google Maps'},
      {en:'Digital Acquisition',es:'Captacion digital'},
      {en:'Online Quoting',es:'Cotizacion online'}
    ];
    var total=0,max=0,details=[];
    for(var i=0;i<checks.length;i++){
      var c=checks[i];var val=data[c.key]||'';var score=c.test(val);
      total+=score;max+=c.max;
      details.push({name:names[i],score:score,max:c.max});
    }
    return {pct:Math.round((total/max)*100),total:total,max:max,details:details};
  }

  /* ── Match sector profile ── */
  function matchProfile(sector){
    if(!sector) return null;
    var sl = sector.toLowerCase();
    for(var key in PROFILES){
      if(key.toLowerCase().indexOf(sl)>-1 || sl.indexOf(key.toLowerCase())>-1) return {key:key,profile:PROFILES[key]};
    }
    for(var key in PROFILES){
      var parts = key.toLowerCase().split(/[\s\/]+/);
      for(var i=0;i<parts.length;i++){
        if(parts[i].length>3 && sl.indexOf(parts[i])>-1) return {key:key,profile:PROFILES[key]};
      }
    }
    return null;
  }

  var DATA = null;

  /* ── Render ── */
  function render(){
    var data = DATA;
    var emptyEl = document.getElementById('emptyState');
    var emptyTitle = document.getElementById('emptyTitle');
    var emptyDesc = document.getElementById('emptyDesc');
    if(!data || !data.negocio){
      if(emptyTitle) emptyTitle.textContent = T.emptyTitle[lang];
      if(emptyDesc) emptyDesc.textContent = T.emptyDesc[lang];
      document.getElementById('topBadge').textContent = T.topBadge[lang];
      return;
    }
    if(emptyEl) emptyEl.style.display='none';
    document.getElementById('topBadge').textContent = T.topBadge[lang];

    var score = computeScore(data);
    var needs = data.necesidades ? data.necesidades.split(',').map(function(s){return s.trim();}) : [];
    var matchedSolutions = [];
    for(var i=0;i<needs.length;i++){
      if(SOLUTIONS[needs[i]]) matchedSolutions.push({key:needs[i],sol:SOLUTIONS[needs[i]]});
    }
    matchedSolutions.sort(function(a,b){return a.sol.priority-b.sol.priority;});

    var scoreColor = score.pct>=60?'var(--green)':score.pct>=30?'var(--yellow)':'var(--red)';
    var circ = 2*Math.PI*52;
    var offset = circ-(score.pct/100)*circ;

    var profile = matchProfile(data.sector);
    var L = lang;
    var html = '';

    /* Hero */
    html += '<div class="hero">';
    html += '<div class="tag">'+T.heroTag[L]+'</div>';
    var sectorDisplay = profile ? profile.profile[L] : esc(data.sector||'');
    html += '<h1>'+esc(data.negocio)+' <span>&mdash; '+sectorDisplay+'</span></h1>';
    html += '<div class="subtitle">'+esc(data.ciudad||'')+(data.tiempo_mercado?' &middot; '+esc(data.tiempo_mercado):'')+' </div>';
    if(data._ref) html += '<div class="ref">'+esc(data._ref)+'</div>';
    if(profile) html += '<div class="profile-tag">'+T.lbl_profile[L]+': '+profile.profile[L]+'</div>';
    html += '</div>';

    /* Business summary */
    html += '<div class="card"><div class="card-label">'+T.lbl_overview[L]+'</div>';
    html += '<div class="summary-grid">';
    html += si(T.lbl_contact[L],data.nombre||'-');
    html += si(T.lbl_phone[L],data.telefono||'-');
    html += si(T.lbl_email[L],data.email||'-');
    html += si(T.lbl_coverage[L],data.cobertura||'-');
    html += si(T.lbl_customers[L],data.clientes_mes||'-');
    html += si(T.lbl_clienttype[L],data.tipo_cliente||'-');
    html += '</div>';
    if(data.descripcion_negocio){
      html += '<div style="margin-top:16px;font-size:14px;color:var(--text-light);line-height:1.6">'+esc(data.descripcion_negocio)+'</div>';
    }
    if(data.servicios){
      html += '<div style="margin-top:12px;font-size:13px"><strong>'+T.lbl_services[L]+':</strong> '+esc(data.servicios)+'</div>';
    }
    if(data.diferenciador){
      html += '<div style="margin-top:8px;font-size:13px"><strong>'+T.lbl_diff[L]+':</strong> '+esc(data.diferenciador)+'</div>';
    }
    html += '</div>';

    /* Score */
    html += '<div class="card"><div class="card-label">'+T.lbl_score[L]+'</div>';
    html += '<div class="score-section">';
    html += '<div class="score-ring">';
    html += '<svg viewBox="0 0 120 120"><circle class="bg" cx="60" cy="60" r="52"/>';
    html += '<circle class="fg" cx="60" cy="60" r="52" stroke="'+scoreColor+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'"/></svg>';
    html += '<div class="score-text">'+score.pct+'</div>';
    html += '<div class="score-label">/ 100</div>';
    html += '</div>';
    html += '<div class="score-breakdown">';
    for(var i=0;i<score.details.length;i++){
      var d=score.details[i];
      var cls=d.score>=d.max?'yes':d.score>0?'partial':'no';
      var lbl=d.score>=d.max?T.st_active[L]:d.score>0?T.st_partial[L]:T.st_missing[L];
      html += '<div class="sb-row"><span class="sb-name">'+d.name[L]+'</span><span class="sb-status '+cls+'">'+lbl+'</span></div>';
    }
    html += '</div></div></div>';

    /* Current assets */
    var hasAssets = data.url_web||data.tiene_web==='si'||data.tiene_web==='basica'||data.redes;
    if(hasAssets){
      html += '<div class="card"><div class="card-label">'+T.lbl_assets[L]+'</div>';
      html += '<div style="display:flex;flex-direction:column;gap:10px">';
      if(data.tiene_web==='si'&&data.url_web){
        html += '<div class="insight-block"><div class="ib-label">'+T.web_active[L]+'</div><div class="ib-text" style="font-style:normal"><a href="'+esc(data.url_web)+'" target="_blank" style="color:var(--cyan);text-decoration:none">'+esc(data.url_web)+'</a> &mdash; '+T.web_optimize[L]+'</div></div>';
      } else if(data.tiene_web==='basica'&&data.url_web){
        html += '<div class="insight-block" style="border-color:var(--yellow)"><div class="ib-label">'+T.web_outdated[L]+'</div><div class="ib-text" style="font-style:normal"><a href="'+esc(data.url_web)+'" target="_blank" style="color:var(--cyan);text-decoration:none">'+esc(data.url_web)+'</a> &mdash; '+T.web_redesign[L]+'</div></div>';
      } else if(data.tiene_web==='basica'){
        html += '<div class="insight-block" style="border-color:var(--yellow)"><div class="ib-label">'+T.web_outdated[L]+'</div><div class="ib-text" style="font-style:normal">'+T.web_existing[L]+'</div></div>';
      } else if(data.tiene_web==='no'||!data.tiene_web){
        html += '<div class="insight-block" style="border-color:var(--red)"><div class="ib-label">'+T.web_none[L]+'</div><div class="ib-text" style="font-style:normal">'+T.web_scratch[L]+'</div></div>';
      }
      if(data.redes){
        var rList=data.redes.split(',').map(function(s){return s.trim();});
        html += '<div class="insight-block"><div class="ib-label">'+T.lbl_channels[L]+' ('+rList.length+')</div><div class="ib-text" style="font-style:normal">'+esc(data.redes)+'</div></div>';
      }
      html += '</div></div>';
    }

    /* Pain & Goal */
    if(data.dolor_principal||data.meta_6meses){
      html += '<div class="card"><div class="card-label">'+T.lbl_pain[L]+'</div>';
      if(data.dolor_principal){
        html += '<div class="insight-block"><div class="ib-label">'+T.lbl_challenge[L]+'</div><div class="ib-text">"'+esc(data.dolor_principal)+'"</div></div>';
      }
      if(data.meta_6meses){
        html += '<div class="insight-block"><div class="ib-label">'+T.lbl_goal6[L]+'</div><div class="ib-text">"'+esc(data.meta_6meses)+'"</div></div>';
      }
      html += '</div>';
    }

    /* Needs */
    if(needs.length){
      html += '<div class="card"><div class="card-label">'+T.lbl_needs[L]+'</div>';
      html += '<div class="needs-list">';
      for(var i=0;i<needs.length;i++){
        var matched=SOLUTIONS[needs[i]]?' matched':'';
        var needLabel = NEEDS_I18N[needs[i]] ? NEEDS_I18N[needs[i]][L] : esc(needs[i]);
        html += '<div class="need-tag'+matched+'">'+needLabel+'</div>';
      }
      html += '</div></div>';
    }

    /* Solutions */
    if(matchedSolutions.length){
      html += '<div class="card"><div class="card-label">'+T.lbl_solutions[L]+'</div>';
      html += '<div class="solutions-grid">';
      for(var i=0;i<matchedSolutions.length;i++){
        var s=matchedSolutions[i].sol;
        var k=matchedSolutions[i].key;
        var num=String(i+1).padStart(2,'0');
        var badge='';
        if(k==='Website / Landing'&&(data.tiene_web==='si'||data.tiene_web==='basica')){
          badge='<span style="display:inline-block;margin-left:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);font-weight:500">'+T.badge_optimize[L]+'</span>';
        } else if(k==='SEO / Google'&&data.redes&&data.redes.indexOf('Google Maps')>-1){
          badge='<span style="display:inline-block;margin-left:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);font-weight:500">'+T.badge_enhance[L]+'</span>';
        } else {
          badge='<span style="display:inline-block;margin-left:8px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);font-weight:500">'+T.badge_new[L]+'</span>';
        }
        var scopes = s.scope[L]||s.scope.en;
        html += '<div class="sol-card">';
        html += '<div class="sol-num">'+num+'</div>';
        html += '<div class="sol-title">'+s.title[L]+badge+'</div>';
        html += '<div class="sol-desc">'+s.desc[L]+'</div>';
        html += '<div class="sol-scope">';
        for(var j=0;j<scopes.length;j++) html += '<span>'+scopes[j]+'</span>';
        html += '</div></div>';
      }
      html += '</div></div>';
    }

    /* Budget */
    if(data.presupuesto||data.urgencia){
      html += '<div class="card"><div class="card-label">'+T.lbl_budget[L]+'</div>';
      html += '<div class="summary-grid">';
      if(data.presupuesto) html += si(T.lbl_monthly[L],data.presupuesto);
      if(data.urgencia) html += si(T.lbl_urgency[L],data.urgencia);
      if(data.inversion_inicial){
        var invLabel = data.inversion_inicial==='si'?T.inv_ready[L]:data.inversion_inicial==='piloto'?T.inv_pilot[L]:T.inv_info[L];
        html += si(T.lbl_investment[L],invLabel);
      }
      if(data.contacto_preferido) html += si(T.lbl_prefcontact[L],data.contacto_preferido);
      html += '</div></div>';
    }

    /* CTA */
    html += '<div class="cta-section">';
    html += '<h2>'+T.cta_title[L]+'</h2>';
    html += '<p>'+T.cta_desc[L]+'</p>';
    html += '<a href="https://7group.site/agendar/" class="cta-btn">'+T.cta_btn[L]+' &rarr;</a>';
    html += '</div>';

    html += '<div class="foot">'+T.foot[L]+'</div>';

    document.getElementById('main').innerHTML = html;
  }

  function si(label,value){
    return '<div class="summary-item"><div class="si-label">'+label+'</div><div class="si-value">'+esc(value)+'</div></div>';
  }

  function esc(s){
    var d=document.createElement('div');
    d.textContent=s||'';
    return d.innerHTML;
  }

  /* ── Language switcher ── */
  window.setLang = function(l){
    lang=l;
    document.documentElement.lang=l;
    var toggles=document.querySelectorAll('.lang-toggle span');
    for(var i=0;i<toggles.length;i++){
      toggles[i].classList.toggle('active',toggles[i].dataset.lang===l);
    }
    render();
  };

  /* ── Init ── */
  lang = detectLang();
  DATA = getParams();
  var toggles=document.querySelectorAll('.lang-toggle span');
  for(var i=0;i<toggles.length;i++){
    toggles[i].classList.toggle('active',toggles[i].dataset.lang===lang);
  }
  document.documentElement.lang=lang;
  render();

})();
</script>
</body>
</html>
