<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>
  <!-- "7" glyph — path-based for reliable cross-browser rendering -->
  <!-- Top horizontal bar -->
  <rect x="5" y="6" width="15" height="4" rx="2" fill="#f5f5f5"/>
  <!-- Diagonal stroke (approximated as a rotated rect) -->
  <polygon points="17,10 21,10 13,26 9,26" fill="#f5f5f5"/>
  <!-- Cyan accent dot — bottom right, mirrors the brand "." -->
  <circle cx="25.5" cy="25.5" r="4.5" fill="#5ee7f7"/>
</svg>
